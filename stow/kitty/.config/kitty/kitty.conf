# Mirror the existing Alacritty terminal defaults as closely as Kitty supports.

# Window appearance
# hide_window_decorations yes
window_padding_width 0 12
background_opacity 0.6


# shell 
shell /etc/profiles/per-user/miranda/bin/zsh


# Typography
font_size 13.4
font_family JetBrainsMono Nerd Font SemiBold
bold_font auto
italic_font auto
bold_italic_font auto

# Match Ctrl+Backspace -> Ctrl+W from the Alacritty config.
map ctrl+backspace send_key ctrl+w


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
